name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build preview app
        run: |
          xcodebuild \
            -project PrismDrift.xcodeproj \
            -scheme PrismDrift \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build screen saver bundle
        run: |
          xcodebuild \
            -project PrismDrift.xcodeproj \
            -scheme PrismDriftSaver \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            ARCHS='arm64 x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
